version: '3.8'

services:
  king-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: king-ai
    ports:
      - "8080:8080"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - SERVER_PORT=8080
      - SPRING_PROFILE=prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - king-network
    volumes:
      - ./logs:/app/logs

networks:
  king-network:
    driver: bridge

volumes:
  logs:
